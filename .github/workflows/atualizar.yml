name: Atualizar Portal de Notícias

# Dispara automaticamente a cada 1 hora e permite execução manual
on:
  schedule:
    - cron: '0 * * * *'  # A cada hora em ponto
  workflow_dispatch:

jobs:
  gerar-pagina:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 lxml

      - name: Executar o robô
        run: python robo_portal.py

      - name: Fazer commit e enviar alterações
        run: |
          git config --local user.name "GitHub Actions"
          git config --local user.email "actions@github.com"
          git add index.html
          git commit -m "Atualização automática de notícias $(date +'%d/%m/%Y %H:%M')" || echo "Nenhuma alteração para enviar"
          git push
